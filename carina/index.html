            display: -ms-flexbox;
            display: -moz-flex;
            display: -webkit-flex;
            display: flex;

            display: -moz-flex;

            display: flex;

            color: #999;

            max-width: 50%;
        }

            font-family: 'Playfair Display', Arial, serif;
            font-style: italic;
            color: black;
        }

        h3 {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
        }

            margin-top: 20px;
        }

            font-size: 12px;
            font-weight: bold;
            margin-bottom: 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

            font-family: 'Playfair Display', Arial, serif;
            font-style: italic;
            color: black;

            margin-bottom: 0;
            letter-spacing: 1px;

        }

            margin-top: 20px
        }

            color: #1e88e5;
            text-decoration: none;
        }

        p {
            line-height: 24px;
        }

        p.info {
            margin-bottom: 15px;
        }

        p+p.info {
            margin-top: 15px;
        }

        img {
            display: block;
            width: 100%;
            max-width: 100%;
            border: 0px;
        }

        @media (max-width:1200px) {
            .container div {
                width: 40%;
                flex-grow: 1;
            }

            h1,
            h1+h2 {
                margin: 0 auto;
                max-width: 70%;
            }
        }

        @media (max-width:980px) {

            .container,
            .container2 {

                display: -webkit-box;
                display: -moz-box;
                display: -ms-flexbox;
                display: -moz-flex;
                display: -webkit-flex;
                display: block !important;

            .container2 div {
                width: 100%;
                flex-grow: 1;
            }

                padding-bottom: 15px;
            }

            h1+h2 {

                max-width: 90%;
